data:
  train_dir: data/train
  test_dir: data/test
  sample_submission: data/sample_submission.csv
model:
  name: vit_large_patch16_dinov3.lvd1689m
  img_size: 256
features:
  views_train: [identity]
  views_test: [identity, hflip]
  train_aug_views: 8
cv:
  n_folds: 4
  n_repeats: 3
  c_grid: [0.1, 0.3, 1.0, 3.0, 10.0, 30.0, 100.0]
seed: 42
batch_size: 32
output_dir: outputs
lora:
  blocks: 4            # adapt the last n transformer blocks
  r: 8
  alpha: 16
  dropout: 0.05
  img_size: 256
  batch_size: 32
  epochs: 30
  patience: 5
  lr_lora: 1.0e-4
  lr_head: 1.0e-3
  weight_decay: 0.01
  label_smoothing: 0.1
  warmup_frac: 0.1
  val_frac: 0.2
  probe_c: 0.1         # frozen linear-probe c for the paired baseline (deployed best_c)
  seeds: [42, 43, 44]
inference:
  sinkhorn: false
output_submission: submission.csv
