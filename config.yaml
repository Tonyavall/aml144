data:
  train_dir: data/train
  test_dir: data/test
  sample_submission: data/sample_submission.csv
model:
  name: vit_large_patch16_dinov3.lvd1689m
  img_size: 256
features:
  views_train: [identity]
  views_test: [identity, hflip]
  train_aug_views: 8
cv:
  n_folds: 4
  n_repeats: 3
  c_grid: [0.1, 0.3, 1.0, 3.0, 10.0, 30.0, 100.0]
seed: 42
batch_size: 32
output_dir: outputs
lora:
  blocks: 4 # adapt the last n transformer blocks
  r: 8
  alpha: 16
  dropout: 0.05
  img_size: 256
  batch_size: 32
  epochs: 30
  patience: 5
  lr_lora: 1.0e-4
  lr_head: 1.0e-3
  weight_decay: 0.01
  label_smoothing: 0.1
  warmup_frac: 0.1
  val_frac: 0.2
  probe_c: 0.1 # frozen linear-probe c for the paired baseline (deployed best_c)
  seeds: [42, 43, 44]
inference:
  sinkhorn: false
output_submission: submission.csv
backbones:
  - {name: vit_large_patch16_dinov3.lvd1689m,          img_size: 256, pool: cls_meanpatch, aug_views: 8}
  - {name: vit_so400m_patch14_siglip_gap_378.v2_webli, img_size: 378, pool: default,       aug_views: 1}
  - {name: aimv2_large_patch14_336.apple_pt_dist,      img_size: 336, pool: default,       aug_views: 1}
ensemble:
  weight_step: 0.1
  weight_margin: 0.003
  output_submission: submission_ensemble.csv
ensemble_ft:
  deploy_seed: 42
  oof_seeds: [42, 43, 44]
  weight_step: 0.1
  weight_margin: 0.003
  output_submission: submission_ensemble_ft.csv
  members:
    - {name: vit_large_patch16_dinov3.lvd1689m,          img_size: 256, pool_mode: cls_meanpatch}
    - {name: vit_so400m_patch14_siglip_gap_378.v2_webli, img_size: 378, pool_mode: avg, lora: {batch_size: 16}}
    - {name: aimv2_large_patch14_336.apple_pt_dist,      img_size: 336, pool_mode: avg}
single_ft:
  deploy_seed: 42
  oof_seeds: [42, 43, 44]
  output_submission: submission_siglip2.csv
  member:
    name: vit_so400m_patch14_siglip_gap_378.v2_webli
    img_size: 378
    pool_mode: avg
    # deployed config: identity-only eval (hflip tta tested and rejected)
    lora: {batch_size: 16, head_type: cosine, class_balanced: true, tta_views: [identity], cosine_scale: 10.0}
final_blend:
  class_names: src/data/class_names.csv
  prompt_template: "a photo of a {name}."
  weight_step: 0.1
  weight_margin: 0.003
  output_submission: submission_blend.csv
  backbones:
    - {model_id: google/siglip2-giant-opt-patch16-384, tag: gopt384, batch_size: 16}
    - {model_id: google/siglip2-so400m-patch16-512,    tag: so400m512, batch_size: 16}
